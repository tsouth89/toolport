name: Release

# Push a version tag (e.g. `v0.2.0`) and this builds installers for Windows,
# macOS, and Linux, then attaches them to a DRAFT GitHub release. Review the
# draft and publish it. Bump the version in src-tauri/tauri.conf.json (and
# Cargo.toml / package.json) to match the tag before tagging.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest # universal: Apple Silicon + Intel in one .dmg
            bundles: dmg
            target: universal-apple-darwin
          - os: ubuntu-22.04
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # pkg-config + libdbus-1-dev are required to build libdbus-sys, pulled in
          # by the Secret Service keychain backend; without them the Linux build
          # fails to compile.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libdbus-1-dev

      - name: Add macOS universal Rust targets
        if: matrix.target == 'universal-apple-darwin'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npx tauri build --config src-tauri/tauri.bundle.conf.json --bundles ${{ matrix.bundles }} ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        env:
          # When set, prepare-sidecar builds the gateway for this target (or lipos a
          # universal one); empty on Windows/Linux, which build for the host.
          CONDUIT_SIDECAR_TARGET: ${{ matrix.target }}
          # macOS code signing + notarization. Empty/ignored on Windows and Linux;
          # Tauri only acts on these when building the macOS bundle. Set these as
          # repository secrets to produce a signed, notarized .dmg (see
          # docs/SIGNING.md). Without them the macOS build is unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Draft release with the installers
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

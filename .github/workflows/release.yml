name: Release

# Push a version tag (e.g. `v0.2.0`) and this builds installers for Windows,
# macOS, and Linux, then attaches them to a DRAFT GitHub release. Review the
# draft and publish it. Bump the version in src-tauri/tauri.conf.json (and
# Cargo.toml / package.json) to match the tag before tagging.
#
# It also emits signed auto-updater artifacts and a `latest.json` manifest, so
# installed copies (v0.3.3+) can update themselves. The Tauri updater signing
# key lives in two repo secrets: TAURI_SIGNING_PRIVATE_KEY and
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD. The matching public key is in
# tauri.conf.json under plugins.updater.pubkey.
#
# Windows installers are Authenticode-signed via Azure Trusted Signing when the
# AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET secrets and the
# AZURE_SIGNING_PROFILE variable are set (see docs/SIGNING.md). Until then the
# signing step is skipped and Windows ships unsigned. macOS signing is unchanged
# (the APPLE_* secrets below).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest # Apple Silicon (native)
            bundles: app
            target: aarch64-apple-darwin
          - os: macos-latest # Intel (cross-compiled on the arm64 runner)
            bundles: app
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    env:
      # Azure Trusted Signing credentials for Windows Authenticode. These stay empty
      # until you add the repo secrets, which keeps signing inert: the setup step
      # below is gated on AZURE_CLIENT_ID being non-empty, so a release tagged before
      # the secrets exist builds an unsigned Windows installer exactly as before.
      # trusted-signing-cli reads these via DefaultAzureCredential during the build.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      # Third-party actions are pinned to full commit SHAs (not mutable tags): this
      # workflow holds the Apple/Azure/Tauri signing secrets, so a compromised upstream
      # tag must not be able to inject code into a signed release. Version in the comment.
      # persist-credentials: false so the GITHUB_TOKEN isn't left in .git/config where a
      # malicious npm/cargo dependency install script (run with the signing secrets in
      # env) could read and exfiltrate it. Nothing here uses the persisted credential:
      # the only token use is an explicit GH_TOKEN env var on the manifest step.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # Windows runs downstream `.cmd`/`.bat` shims (e.g. npx.cmd) through cmd.exe;
      # Rust 1.77.2 fixed batch-file argument escaping (CVE-2024-24576 / BatBadBut).
      # `@stable` is always well past this, but assert it so a future toolchain
      # downgrade can't silently reintroduce the argument-injection class.
      - name: Verify Rust meets the batch-arg-escaping floor (>= 1.77.2)
        shell: bash
        run: |
          v=$(rustc --version | awk '{print $2}')
          printf '1.77.2\n%s\n' "$v" | sort -V -C || {
            echo "::error::rustc $v is below the 1.77.2 floor for Windows .cmd argument escaping"; exit 1; }

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # pkg-config + libdbus-1-dev are required to build libdbus-sys, pulled in
          # by the Secret Service keychain backend; without them the Linux build
          # fails to compile.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libdbus-1-dev

      - name: Add the macOS Rust target
        if: matrix.target
        run: rustup target add ${{ matrix.target }}

      # Cache DEPENDENCY build artifacts only, never the workspace's own crates.
      # History: a naive actions/cache of all of `src-tauri/target` (still used by ci.yml)
      # once served a stale local-crate compile that cargo trusted (the crate recompiled 0
      # times), so v0.3.12/v0.3.13 shipped signed binaries missing a command. Swatinem/
      # rust-cache is different in the way that matters here: before saving it evicts the
      # workspace members (the `conduit` lib + its bins) from the cache, so they ALWAYS
      # recompile from the tagged source, while the third-party deps (the bulk of the
      # compile) are restored. That is the from-scratch guarantee for OUR code plus the
      # speedup for everyone else's. Do NOT replace this with a plain actions/cache of
      # `target/`. Keyed per matrix leg so the two macOS targets don't share a cache.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target || matrix.bundles }}

      - name: Install dependencies
        run: npm ci

      - name: Give the Linux runner headroom (the app crate still links from scratch)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # v0.3.14's Linux job was killed mid-build with no error output: even with the
          # dependency cache, the `conduit` crate always recompiles and its WebKitGTK link
          # step exhausts the runner. Free disk and add swap so it can't OOM/run out.
          # Best-effort so a transient hiccup here never fails the release.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift 2>/dev/null || true
          sudo fallocate -l 10G /mnt/conduit-swap && sudo chmod 600 /mnt/conduit-swap \
            && sudo mkswap /mnt/conduit-swap && sudo swapon /mnt/conduit-swap || true
          echo "disk:"; df -h /
          echo "mem:"; free -h

      # Windows Authenticode signing via Azure Trusted Signing. Gated on the
      # AZURE_CLIENT_ID secret being present, so until the signing secrets exist
      # this step is skipped and the Windows build is unsigned, exactly as before.
      # trusted-signing-cli is a small Rust tool (the runner already has cargo).
      # Tauri runs it as a per-binary signCommand, signing the app exe, the bundled
      # gateway sidecar, and the NSIS installer BEFORE it computes the updater
      # signature, so auto-update keeps working (a post-build sign would invalidate
      # the .sig). Endpoint/account default to this project's values; the cert
      # profile name must be set as the AZURE_SIGNING_PROFILE repo variable.
      # trusted-signing-cli is built from source (cargo install) on the Windows job. Cache
      # the compiled binary so a release only rebuilds it when the key is bumped. Bump the
      # `-v1` suffix to force a fresh install (e.g. to pick up a new version of the tool).
      - name: Cache trusted-signing-cli
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/trusted-signing-cli.exe
          key: trusted-signing-cli-${{ runner.os }}-v1

      - name: Set up Windows code signing (Azure Trusted Signing)
        id: winsign
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.cargo\bin\trusted-signing-cli.exe")) {
            cargo install trusted-signing-cli --locked
          } else {
            Write-Host "trusted-signing-cli restored from cache"
          }
          $endpoint = "${{ vars.AZURE_SIGNING_ENDPOINT }}"; if (-not $endpoint) { $endpoint = "https://eus.codesigning.azure.net" }
          $account  = "${{ vars.AZURE_SIGNING_ACCOUNT }}";  if (-not $account)  { $account  = "southforgesigning" }
          $certProfile = "${{ vars.AZURE_SIGNING_PROFILE }}"
          if (-not $certProfile) { Write-Error "AZURE_SIGNING_PROFILE repo variable is not set (the certificate profile name)"; exit 1 }
          $cmd = "trusted-signing-cli -e $endpoint -a $account -c $certProfile -d Toolport %1"
          $conf = @{ bundle = @{ windows = @{ signCommand = $cmd } } } | ConvertTo-Json -Depth 5
          Set-Content -Path "src-tauri/tauri.signing.conf.json" -Value $conf -Encoding utf8
          "config_arg=--config src-tauri/tauri.signing.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Windows signing enabled:`n$conf"

      - name: Build installer
        run: npx tauri build --config src-tauri/tauri.bundle.conf.json ${{ steps.winsign.outputs.config_arg }} --bundles ${{ matrix.bundles }} ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        env:
          # When set, prepare-sidecar builds the gateway for this target; empty on
          # Windows/Linux, which build for the host.
          CONDUIT_SIDECAR_TARGET: ${{ matrix.target }}
          # Tauri updater signing. Required to produce signed `.sig` files for the
          # updater artifacts (createUpdaterArtifacts is set in the bundle config).
          # macOS regenerates these in the signing step below; the others use them
          # as-is.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS is intentionally built UNSIGNED here. The keychain-access-group
          # fix needs the gateway nested in its own .app + embedded provisioning
          # profiles + inside-out signing, none of which Tauri's built-in macOS
          # signing can do. The "Sign + notarize + package (macOS)" step below owns
          # ALL macOS signing, notarization, dmg, and updater-artifact generation.

      # macOS signing + packaging. Tauri built the app UNSIGNED above; this step
      # nests the gateway in its own .app, embeds the app + gateway provisioning
      # profiles, signs inside-out, notarizes + staples, builds + notarizes the
      # dmg, and regenerates the updater artifact (`Toolport_<target>.app.tar.gz`
      # + .sig) over the re-signed app so auto-update keeps working. Each arch is
      # named by its target so latest.json can point at the right one.
      #
      # Requires, in addition to the existing APPLE_*/TAURI_SIGNING_* secrets, two
      # new ones holding the base64 of the Developer ID provisioning profiles:
      # APPLE_PROVISIONING_PROFILE_APP and APPLE_PROVISIONING_PROFILE_GATEWAY. The
      # script fails fast with a clear message if any required secret is missing.
      - name: Sign + notarize + package (macOS)
        if: startsWith(matrix.os, 'macos')
        run: bash scripts/macos-package-ci.sh
        env:
          APP: src-tauri/target/${{ matrix.target }}/release/bundle/macos/Toolport.app
          TARGET: ${{ matrix.target }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE_APP: ${{ secrets.APPLE_PROVISIONING_PROFILE_APP }}
          APPLE_PROVISIONING_PROFILE_GATEWAY: ${{ secrets.APPLE_PROVISIONING_PROFILE_GATEWAY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Draft release with the installers
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/Toolport_*-apple-darwin.app.tar.gz
            src-tauri/target/*/release/bundle/macos/Toolport_*-apple-darwin.app.tar.gz.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  # Assemble the updater manifest from every platform's signature, after all
  # installers are uploaded to the draft. If this job fails the draft still has
  # working installers - only auto-update is affected.
  updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Compose and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          base="https://github.com/$REPO/releases/download/$TAG"
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir sigs
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          pick() { echo "$assets" | grep -E "$1" | head -1 || true; }
          win=$(pick '\-setup\.exe$')
          mac_arm=$(pick 'aarch64-apple-darwin\.app\.tar\.gz$')
          mac_x64=$(pick 'x86_64-apple-darwin\.app\.tar\.gz$')
          lin=$(pick '\.AppImage$')

          # Refuse to compose a manifest with a missing asset or empty signature: a
          # blank signature makes that platform's updater silently reject EVERY
          # update. If a matrix build failed (fail-fast is off), its artifacts are
          # absent here. Better to fail this job - the installers are already on the
          # draft - than publish a manifest that bricks a platform's auto-update.
          fail=0
          for pair in "windows:$win" "darwin-aarch64:$mac_arm" "darwin-x86_64:$mac_x64" "linux:$lin"; do
            label="${pair%%:*}"; name="${pair#*:}"
            if [ -z "$name" ]; then echo "::error::missing installer asset for $label"; fail=1; continue; fi
            if [ ! -s "sigs/$name.sig" ]; then echo "::error::missing or empty signature for $name ($label)"; fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Refusing to compose latest.json with missing assets/signatures. Re-run the failed build job(s), then re-run this job."
            exit 1
          fi

          sig() { cat "sigs/$1.sig"; }
          jq -n \
            --arg version "$TAG" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_url "$base/$win"       --arg win_sig "$(sig "$win")" \
            --arg marm_url "$base/$mac_arm"  --arg marm_sig "$(sig "$mac_arm")" \
            --arg mx64_url "$base/$mac_x64"  --arg mx64_sig "$(sig "$mac_x64")" \
            --arg lin_url "$base/$lin"       --arg lin_sig "$(sig "$lin")" \
            '{
               version: $version,
               pub_date: $pub_date,
               platforms: {
                 "windows-x86_64": { signature: $win_sig,  url: $win_url },
                 "darwin-aarch64": { signature: $marm_sig, url: $marm_url },
                 "darwin-x86_64":  { signature: $mx64_sig, url: $mx64_url },
                 "linux-x86_64":   { signature: $lin_sig,  url: $lin_url }
               }
             }' > latest.json

          # Belt and suspenders: never upload a manifest with an empty signature.
          if jq -e '[.platforms[].signature] | any(. == "")' latest.json >/dev/null; then
            echo "::error::latest.json has an empty signature; not uploading."; exit 1
          fi
          echo "--- latest.json ---"; cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

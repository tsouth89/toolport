name: Audit

# Scans the dependency tree for RustSec advisories. Runs on dependency changes,
# on every PR, and weekly so newly-published advisories surface even when the
# lockfile hasn't changed. Triaged-and-accepted advisories are listed in
# src-tauri/.cargo/audit.toml.
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "src-tauri/.cargo/audit.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "src-tauri/.cargo/audit.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 9 * * 1" # Mondays, 09:00 UTC

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit dependencies
        working-directory: src-tauri
        run: cargo audit

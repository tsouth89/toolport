name: Audit

# Scans the dependency tree for RustSec advisories. Runs on dependency changes,
# on every PR, and weekly so newly-published advisories surface even when the
# lockfile hasn't changed. Triaged-and-accepted advisories are listed in
# src-tauri/.cargo/audit.toml.
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "src-tauri/.cargo/audit.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "src-tauri/.cargo/audit.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 9 * * 1" # Mondays, 09:00 UTC

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        working-directory: src-tauri
        run: cargo audit

name: Publish gateway image

# Builds toolport-gateway with cached Rust on the host, then packages a slim
# runtime image to GHCR. Avoids compiling Tauri/WebKit inside Docker (~9 min).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-gateway-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the top level: read-only. Only the publish job below is
# granted packages:write (GHCR push); the build-gateway job just compiles and
# uploads an artifact, so it needs no write scope.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/tsouth89/toolport-gateway

jobs:
  build-gateway:
    name: build gateway binary
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config libdbus-1-dev

      - name: Cache cargo + target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build toolport-gateway
        run: cargo build --release --bin toolport-gateway --manifest-path src-tauri/Cargo.toml --no-default-features

      - name: Test toolport-gateway
        run: cargo test --release --bin toolport-gateway --manifest-path src-tauri/Cargo.toml --no-default-features

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: toolport-gateway-bin
          path: src-tauri/target/release/toolport-gateway
          retention-days: 1

  publish:
    name: build + push image
    needs: build-gateway
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: toolport-gateway-bin
          path: artifact

      - name: Stage binary for Dockerfile
        run: cp artifact/toolport-gateway toolport-gateway-bin && chmod 755 toolport-gateway-bin

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
reviews:
  # "chill" keeps it to substantive findings instead of nitpicking every line.
  profile: chill
  # Advisory only — CodeRabbit should never block a merge with a change request.
  request_changes_workflow: false
  # Keep the per-PR inbox noise down for anyone watching the repo: drop the boilerplate
  # summary + review-status comments so CodeRabbit only speaks up when it has an actual
  # finding, and don't re-review on every push (the initial review still runs).
  high_level_summary: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    # Review once when the PR opens, not again on each subsequent commit.
    auto_incremental_review: false
    # Don't spend review quota on PRs that carry no production logic. Matching is
    # case-insensitive substring against the PR title, and the repo uses
    # conventional-commit prefixes, so "docs:", "chore:", "style:" and friends are
    # caught. Deliberately NOT skipped: "ci"/"build"/"deps", where a workflow or
    # dependency change can be security-relevant and is worth a look.
    ignore_title_keywords:
      - docs
      - chore
      - style
      - typo
      - release
      - WIP
  # Skip generated / vendored / build output so reviews stay signal-heavy.
  # Prose is excluded too, so a docs-only PR has nothing left to review even if
  # its title doesn't match the keywords above.
  path_filters:
    - "!**/package-lock.json"
    - "!**/*.lock"
    - "!dist/**"
    - "!src-tauri/target/**"
    - "!**/*.min.*"
    - "!**/*.md"
    - "!**/*.mdx"
    - "!**/LICENSE"
  path_instructions:
    - path: "src/**/*.{ts,tsx}"
      instructions: >-
        React + TypeScript frontend. Formatting and lint style are enforced by
        Prettier and ESLint in CI, so do NOT comment on formatting, semicolons,
        quotes, or import order. Focus on logic correctness, React hooks
        dependencies, state handling, and accessibility.
    - path: "src-tauri/**/*.rs"
      instructions: >-
        Rust (Tauri app + MCP gateway). rustfmt/clippy own style, so skip it.
        Focus on correctness, panics/unwraps, and the security guards
        (spawn-guard, client scoping, tool-supply-chain checks) where a
        regression is high-impact.
    - path: "**/*.test.ts"
      instructions: >-
        Vitest tests. Prefer flagging missing edge cases or incorrect
        expectations over stylistic suggestions.
chat:
  auto_reply: true

<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Toolport lazy discovery: every server's tools collapse to a handful of meta-tools</title>
  <desc>A cloud of many tool names on the left funnels through the Toolport gateway into four meta-tools on the right.</desc>
  <rect x="1" y="1" width="1198" height="598" rx="24" fill="#1E3A66" stroke="rgba(255,255,255,0.10)"/>

  <!-- brand mark: four hex anchor "nuts", drawn in the card navy so they notch the white porthole ring (matches toolport-icon) -->

  <!-- header: porthole mark + wordmark -->
  <g transform="translate(56,40)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#FFFFFF" stroke-width="7"/>
    <g fill="#1E3A66">
      <polygon points="18.00,-0.80 15.58,0.60 15.58,3.40 18.00,4.80 20.42,3.40 20.42,0.60"/>
      <polygon points="34.00,15.20 31.58,16.60 31.58,19.40 34.00,20.80 36.42,19.40 36.42,16.60"/>
      <polygon points="18.00,31.20 15.58,32.60 15.58,35.40 18.00,36.80 20.42,35.40 20.42,32.60"/>
      <polygon points="2.00,15.20 -0.42,16.60 -0.42,19.40 2.00,20.80 4.42,19.40 4.42,16.60"/>
    </g>
    <circle cx="18" cy="18" r="4.5" fill="#F97316"/>
    <text x="50" y="27" font-size="30" font-weight="600" fill="#FFFFFF">Toolport</text>
  </g>
  <text x="1144" y="68" text-anchor="end" font-size="17" fill="#9db0cc" font-family="ui-monospace, Menlo, monospace">local-first MCP gateway</text>

  <!-- funnel lines: cluster -> gateway -->
  <g stroke="#F97316" stroke-width="1.5" opacity="0.30">
    <line x1="430" y1="158" x2="524" y2="254"/>
    <line x1="430" y1="206" x2="524" y2="254"/>
    <line x1="430" y1="254" x2="524" y2="254"/>
    <line x1="430" y1="302" x2="524" y2="254"/>
    <line x1="430" y1="350" x2="524" y2="254"/>
  </g>
  <!-- gateway -> 4 metas -->
  <g stroke="#F97316" stroke-width="2.2" opacity="0.65">
    <line x1="588" y1="254" x2="748" y2="166"/>
    <line x1="588" y1="254" x2="748" y2="228"/>
    <line x1="588" y1="254" x2="748" y2="290"/>
    <line x1="588" y1="254" x2="748" y2="352"/>
  </g>

  <!-- left cluster: many tools -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9db0cc">
    <g><rect x="64" y="140" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="78" y="163">list_charges</text></g>
    <g><rect x="240" y="140" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="254" y="163">run_sql</text></g>
    <g><rect x="64" y="188" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="78" y="211">create_issue</text></g>
    <g><rect x="240" y="188" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="254" y="211">send_email</text></g>
    <g><rect x="64" y="236" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="78" y="259">deploy</text></g>
    <g><rect x="240" y="236" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="254" y="259">get_logs</text></g>
    <g><rect x="64" y="284" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="78" y="307">create_pr</text></g>
    <g><rect x="240" y="284" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="254" y="307">query</text></g>
    <g><rect x="64" y="332" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="78" y="355">list_tables</text></g>
    <g><rect x="240" y="332" width="164" height="36" rx="8" fill="#16294A" stroke="rgba(255,255,255,0.10)"/><text x="254" y="355">get_metrics</text></g>
  </g>

  <!-- gateway node: porthole mark -->
  <circle cx="556" cy="254" r="26" fill="none" stroke="#FFFFFF" stroke-width="10"/>
  <g fill="#1E3A66">
    <polygon points="556.00,223.40 552.02,225.70 552.02,230.30 556.00,232.60 559.98,230.30 559.98,225.70"/>
    <polygon points="582.00,249.40 578.02,251.70 578.02,256.30 582.00,258.60 585.98,256.30 585.98,251.70"/>
    <polygon points="556.00,275.40 552.02,277.70 552.02,282.30 556.00,284.60 559.98,282.30 559.98,277.70"/>
    <polygon points="530.00,249.40 526.02,251.70 526.02,256.30 530.00,258.60 533.98,256.30 533.98,251.70"/>
  </g>
  <circle cx="556" cy="254" r="8" fill="#F97316"/>

  <!-- right: 4 meta-tools -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#FB923C">
    <g><rect x="748" y="140" width="388" height="52" rx="10" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.5)"/><text x="770" y="173">toolport_search_tools</text></g>
    <g><rect x="748" y="202" width="388" height="52" rx="10" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.5)"/><text x="770" y="235">toolport_call_tool</text></g>
    <g><rect x="748" y="264" width="388" height="52" rx="10" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.5)"/><text x="770" y="297">toolport_fetch_result</text></g>
    <g><rect x="748" y="326" width="388" height="52" rx="10" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.5)"/><text x="770" y="359">toolport_status</text></g>
  </g>

  <!-- captions -->
  <text x="264" y="402" text-anchor="middle" font-size="15" fill="#9db0cc" font-family="ui-monospace, Menlo, monospace">every tool, across all your servers</text>
  <text x="942" y="402" text-anchor="middle" font-size="15" fill="#FB923C" font-family="ui-monospace, Menlo, monospace">the handful your agent loads</text>

  <!-- tagline -->
  <line x1="56" y1="444" x2="1144" y2="444" stroke="rgba(255,255,255,0.12)"/>
  <text x="600" y="498" text-anchor="middle" font-size="28" font-weight="600" fill="#FFFFFF">A handful of tools in context, not hundreds.</text>
  <text x="600" y="532" text-anchor="middle" font-size="16" fill="#9db0cc">Measured: 97% less tool overhead per request, ~90% fewer tokens, same results.</text>
</svg>
